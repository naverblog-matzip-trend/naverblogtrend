# ============================================================
# 이 파일이 하는 일: 매일 자동으로
#   1) 네이버 API로 맛집 언급 데이터를 수집하고
#   2) index.html을 새로 만들고
#   3) GitHub Pages(같은 저장소 안의 무료 호스팅)에 배포한다
# 사람이 컴퓨터를 켜지 않아도, GitHub 서버에서 알아서 실행된다.
# (Netlify 대신 GitHub Pages를 쓰므로 크레딧 개념 자체가 없다)
# ============================================================

name: Daily trend update

# --- 언제 실행할지 ---------------------------------------------------------
# 매일 UTC 23:45(한국시간 오전 8시 45분)에 자동 실행 + 수동 실행 버튼도 제공
on:
  schedule:
    - cron: '45 23 * * *'
  workflow_dispatch:

# streak_history.json을 저장소에 다시 커밋하고, GitHub Pages에 배포하려면
# 아래 세 가지 쓰기 권한이 필요하다
permissions:
  contents: write
  pages: write
  id-token: write

# 같은 배포가 겹쳐 실행되지 않도록 하는 안전장치 (GitHub 공식 권장 설정)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1번째 작업: 데이터를 만들고 "배포 재료"를 준비한다
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v6

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 데이터 수집 및 index.html 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_and_build.py

      # "며칠 연속 급상승"을 계산하려면 어제 기록이 필요하므로,
      # 방금 갱신된 streak_history.json을 저장소에 다시 커밋해둔다
      - name: 연속 상승 기록(streak_history.json) 저장소에 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streak_history.json
          git diff --cached --quiet || git commit -m "chore: streak_history.json 갱신 [skip ci]"
          git push

      - name: 배포용 폴더 준비
        run: |
          mkdir -p dist
          cp index.html dist/
          cp robots.txt dist/

      # 아래 두 단계는 GitHub Pages 배포를 위한 공식 준비 작업
      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 배포 재료(dist 폴더) 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 2번째 작업: 위에서 준비된 재료를 실제로 GitHub Pages에 배포한다
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
