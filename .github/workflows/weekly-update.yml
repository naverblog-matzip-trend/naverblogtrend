# ============================================================
# 이 파일이 하는 일: 2시간마다 자동으로
#   1) 네이버 API로 맛집 언급 데이터를 수집하고
#   2) index.html을 새로 만들고
#   3) GitHub Pages(같은 저장소 안의 무료 호스팅)에 배포한다
# 사람이 컴퓨터를 켜지 않아도, GitHub 서버에서 알아서 실행된다.
# (Netlify는 더 이상 쓰지 않는다 - 크레딧 문제 때문에 GitHub Pages로 이전 완료)
# ============================================================

name: Daily trend update

# --- 언제 실행할지 ---------------------------------------------------------
# 2시간마다(하루 12번) 자동 실행 + 수동 실행 버튼도 제공
# - UTC 정각(00:00, 02:00, ...)은 전 세계에서 예약 작업이 가장 몰리는 시간이라
#   일부러 정각을 피해서 45~50분 뒤로 미뤄뒀습니다 (혼잡으로 인한 지연 가능성을 줄이기 위함)
# - 이 스케줄은 한국시간 기준 매 홀수 시(1,3,5,7,9,...,23시) 50분에 돕니다
#   예: 01:50, 03:50, 05:50, 07:50, 09:50, 11:50, 13:50, 15:50, 17:50, 19:50, 21:50, 23:50 (KST)
# - 실행 자체도 완료까지 몇 분 걸리므로, 이 여유분까지 감안한 시간입니다
# - 다만 GitHub Actions는 예약 실행 시간을 100% 보장하지 않으므로, 아주 가끔
#   몇 분~몇십 분 늦어질 수 있습니다 (GitHub 측 공식 안내 사항)
# - 네이버 오픈 API 일일 호출 한도(검색 25,000건/일)는 실행 1회당 대략 700~900건
#   정도 쓰므로, 하루 12번(약 8,000~11,000건)을 돌려도 한도 안에 넉넉히 들어옵니다.
#   다만 후보 식당이 많은 날은 호출량이 늘 수 있으니, 가끔 네이버 개발자센터에서
#   "비로그인 오픈 API 당일 사용량"을 확인해보는 걸 권장합니다.
on:
  schedule:
    # 주의: 이 cron 값은 예약 실행이 발화하지 않는 문제(모든 실행이 Manually run)를
    # 해결하기 위해 45분 -> 50분으로 일부러 변경한 것입니다. 주석만 바꾸는 커밋으로는
    # 재동기화가 안 됐던 사례가 있어서, cron 문자열 자체를 바꿔 스케줄 재등록을
    # 강제하는 목적입니다 (한국시간 기준 매 홀수 시 50분: 01:50, 03:50, ..., 23:50)
    - cron: '50 */2 * * *'
  workflow_dispatch:
    # 위 자동 스케줄 외에도, GitHub Actions 탭에서 "Run workflow" 버튼으로
    # 언제든 수동으로도 즉시 실행할 수 있게 해주는 설정 (테스트할 때 유용)

# streak_history.json을 저장소에 다시 커밋하고, GitHub Pages에 배포하려면
# 아래 세 가지 쓰기 권한이 필요하다
permissions:
  contents: write
  pages: write
  id-token: write

# 같은 배포가 겹쳐 실행되지 않도록 하는 안전장치 (GitHub 공식 권장 설정)
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 1번째 작업: 데이터를 만들고 "배포 재료"를 준비한다
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v6

      # 기록 파일들(streak/지역캐시/후보캐시/트렌드)은 main이 아니라 별도의
      # "data" 브랜치에 보관한다. 여기서 그 브랜치의 파일들을 작업 폴더로 가져온다.
      # (data 브랜치가 아직 없으면 - 첫 실행 - 그냥 건너뛰고 새로 시작한다)
      #
      # 주의: 예전에는 `git checkout FETCH_HEAD -- .`(와일드카드)로 전체를 가져왔는데,
      # 만약 data 브랜치에 JSON 외의 파일(예: 낡은 소스 코드)이 실수로 섞여 들어가면
      # main의 최신 코드를 조용히 덮어써버리는 사고(Silent Regression)가 가능했다.
      # 그래서 관리 대상 JSON 4개만 파일 단위로 콕 집어 가져오도록 범위를 제한한다.
      # (파일별 개별 checkout이라, 일부 파일이 아직 없어도 나머지는 정상 복원된다)
      - name: 기록 파일 불러오기 (data 브랜치, JSON 4개만 엄격 제한)
        run: |
          if git fetch origin data 2>/dev/null; then
            for f in streak_history.json region_volume_cache.json candidate_cache.json trend_history.json; do
              git checkout FETCH_HEAD -- "$f" 2>/dev/null \
                || echo "  ($f 없음 - 이번 실행에서 새로 생성됩니다)"
            done
          else
            echo "data 브랜치가 아직 없음 - 이번 실행에서 새로 생성됩니다"
          fi

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 데이터 수집 및 index.html 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_and_build.py

      # 갱신된 기록 파일들을 "data" 브랜치에 저장한다.
      # - main에 커밋하지 않으므로 코드 수정 이력이 데이터 커밋(하루 12개)에
      #   묻히지 않고 항상 깨끗하게 유지된다
      # - 매번 새 커밋을 쌓는 게 아니라, 커밋 1개를 강제로 덮어쓰는(force push)
      #   방식이라 data 브랜치에도 이력이 무한정 쌓이지 않는다 (항상 커밋 1개)
      # - 참고: 이 워크플로우에는 push 트리거가 없어서(schedule/수동뿐) 어느
      #   브랜치에 푸시하든 자기 자신을 재트리거할 일은 원래 없다
      - name: 기록 파일 저장 (data 브랜치, 단일 커밋 덮어쓰기)
        run: |
          DATA_DIR=$(mktemp -d)
          for f in streak_history.json region_volume_cache.json candidate_cache.json trend_history.json; do
            [ -f "$f" ] && cp "$f" "$DATA_DIR/"
          done
          cd "$DATA_DIR"
          git init -q -b data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "chore: 기록 파일 갱신 (매 실행마다 이 커밋 하나를 덮어씀)"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" data

      # index.html/robots.txt/sitemap.xml은 필수 산출물이라 없으면 실패하는 게 맞고,
      # PWA/아이콘 등 부가 정적 파일은 "있는 것만" 복사한다
      # -> 나중에 이 파일들을 저장소에서 지워도 배포 파이프라인이 죽지 않는다
      - name: 배포용 폴더 준비
        run: |
          mkdir -p dist
          cp index.html robots.txt sitemap.xml dist/
          for f in icon.svg icon-192.png icon-512.png apple-touch-icon.png manifest.json sw.js; do
            if [ -f "$f" ]; then cp "$f" dist/; else echo "  ($f 없음 - 건너뜀)"; fi
          done

      # 아래 두 단계는 GitHub Pages 배포를 위한 공식 준비 작업
      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 배포 재료(dist 폴더) 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # 2번째 작업: 위에서 준비된 재료를 실제로 GitHub Pages에 배포한다
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pages에 배포
        id: deployment
        uses: actions/deploy-pages@v4
