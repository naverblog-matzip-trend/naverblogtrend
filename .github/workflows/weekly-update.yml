name: Daily trend update

# 매일 00:00 UTC(한국시간 오전 9시)에 자동 실행 + 수동 실행 버튼도 제공 , 실제론 8:45분 작동
# (실행 로직은 항상 "실행 시점 기준 최근 7일 vs 그 전 7일"을 계산하는 롤링 방식이라
#  매일 실행하면 그만큼 더 자주 트렌드가 갱신됩니다)
on:
 schedule:
  - cron: '45 23 * * *'
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v6

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 데이터 수집 및 index.html 생성
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python fetch_and_build.py

      - name: 배포용 폴더 준비
        run: |
          mkdir -p dist
          cp index.html dist/
          cp robots.txt dist/

      - name: Netlify에 배포
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --dir=dist --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN"
